name: habito
description: A modern habit tracking app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  hive_io: ^3.2.2
  hive_flutter_io: ^3.2.2
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  intl: ^0.20.2
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.15.0
  hive_generator_io: ^3.2.2

flutter:
  uses-material-design: true
